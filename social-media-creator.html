<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Content Creator — NewSites</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --gold-dim: rgba(201,168,76,0.15);
    --black: #080808;
    --surface: #111111;
    --surface2: #191919;
    --surface3: #222222;
    --border: rgba(201,168,76,0.12);
    --border-hover: rgba(201,168,76,0.3);
    --text: #F5F0E8;
    --text-muted: #8A8070;
    --text-dim: #4A4540;
    --radius: 10px;
    --radius-lg: 14px;
  }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    min-height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    height: 100vh;
  }

  .sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.05em;
  }
  .logo-text span { color: var(--gold); }

  .sidebar-nav {
    padding: 16px 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .nav-section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 8px 8px 4px;
    margin-top: 8px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: var(--radius);
    font-size: 13px;
    color: var(--text-muted);
    text-decoration: none;
    transition: all 0.15s;
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--gold-dim); color: var(--gold); }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* ── Main ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .topbar {
    height: 60px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.05em;
    color: var(--text);
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .credits-badge {
    font-size: 11px;
    color: var(--gold);
    background: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 20px;
    padding: 4px 12px;
  }

  .content {
    padding: 28px;
    max-width: 860px;
    width: 100%;
  }

  /* ── Step labels ── */
  .step-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .step-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Post types ── */
  .post-types {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 28px;
  }

  @media (max-width: 600px) {
    .post-types { grid-template-columns: repeat(2, 1fr); }
    .sidebar { display: none; }
    .content { padding: 16px; }
  }

  .type-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 10px 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
  }
  .type-btn:hover { border-color: var(--border-hover); color: var(--text); background: var(--surface2); }
  .type-btn.active { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }
  .type-btn svg { width: 22px; height: 22px; }
  .type-btn span { font-size: 11px; font-weight: 500; }

  /* ── Platforms ── */
  .platforms {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .platform-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .platform-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .platform-btn.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
  .platform-btn svg { width: 15px; height: 15px; }

  /* ── Form ── */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    margin-bottom: 28px;
  }

  .form-row { margin-bottom: 16px; }
  .form-row:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  textarea, input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 12px 14px;
    resize: vertical;
    transition: border-color 0.15s;
    outline: none;
  }
  textarea:focus, input[type="text"]:focus { border-color: var(--gold); }
  textarea::placeholder, input::placeholder { color: var(--text-dim); }

  .tone-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .tone-chip {
    padding: 5px 13px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tone-chip:hover { border-color: var(--border-hover); color: var(--text); }
  .tone-chip.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

  /* ── Generate button ── */
  .generate-btn {
    width: 100%;
    padding: 14px;
    background: var(--gold);
    color: var(--black);
    border: none;
    border-radius: var(--radius);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .generate-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
  .generate-btn:active { transform: translateY(0); }
  .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .generate-btn svg { width: 18px; height: 18px; }

  /* ── Loading ── */
  .loading {
    display: none;
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 13px;
  }
  .loading.visible { display: block; }
  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid var(--surface3);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Results ── */
  .results { display: none; }
  .results.visible { display: flex; flex-direction: column; gap: 12px; }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .result-platform {
    display: flex;
    align-items: center;
    gap: 9px;
    font-weight: 500;
    font-size: 13px;
  }
  .result-platform svg { width: 18px; height: 18px; color: var(--gold); }

  .char-pill {
    font-size: 10px;
    color: var(--text-muted);
    background: var(--surface3);
    border-radius: 12px;
    padding: 3px 10px;
  }
  .char-pill.over { color: #E24B4A; background: rgba(226,75,74,0.1); }

  .result-body { padding: 18px; }

  .result-copy {
    font-size: 13px;
    line-height: 1.75;
    color: var(--text);
    white-space: pre-wrap;
    margin-bottom: 12px;
  }

  .result-hashtags {
    font-size: 12px;
    color: var(--gold);
    line-height: 1.8;
    margin-bottom: 14px;
  }

  .result-tip {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 10px 12px;
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .result-tip svg { width: 14px; height: 14px; color: var(--gold); flex-shrink: 0; margin-top: 1px; }

  .result-actions {
    display: flex;
    gap: 8px;
    padding: 12px 18px;
    border-top: 1px solid var(--border);
  }

  .action-btn {
    flex: 1;
    padding: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.15s;
  }
  .action-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .action-btn.copied { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
  .action-btn svg { width: 14px; height: 14px; }

  /* ── Error ── */
  .error-card {
    background: rgba(226,75,74,0.08);
    border: 1px solid rgba(226,75,74,0.2);
    border-radius: var(--radius);
    padding: 16px;
    font-size: 13px;
    color: #E24B4A;
    display: none;
  }
  .error-card.visible { display: block; }
</style>
</head>

  <div class="content">

    <!-- Step 1: Post Type -->
    <div class="step-label">Step 1 — choose post type</div>
    <div class="post-types">

        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
        Instagram
      </button>
      <button class="platform-btn active" data-platform="facebook" onclick="togglePlatform(this)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        Facebook
      </button>
      <button class="platform-btn" data-platform="tiktok" onclick="togglePlatform(this)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg>
        TikTok
      </button>
      <button class="platform-btn" data-platform="linkedin" onclick="togglePlatform(this)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        LinkedIn
      </button>
      <button class="platform-btn" data-platform="twitter" onclick="togglePlatform(this)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        X / Twitter
      </button>
    </div>

    <!-- Step 3: Details -->
    <div class="step-label">Step 3 — describe your post</div>
    <div class="form-card">
      <div class="form-row">
        <label for="bizName">Business name (optional)</label>
        <input type="text" id="bizName" placeholder="e.g. Premier Roofing LA">
      </div>
      <div class="form-row">
        <label for="postDesc">What's this post about?</label>
        <textarea id="postDesc" rows="4" placeholder="e.g. We're running a 20% off sale this weekend on all roofing inspections. Want to drive urgent bookings from homeowners in the LA area before storm season."></textarea>
      </div>
      <div class="form-row">
        <label>Tone</label>
        <div class="tone-row">
          <button class="tone-chip active" data-tone="professional" onclick="selectTone(this)">Professional</button>
          <button class="tone-chip" data-tone="friendly" onclick="selectTone(this)">Friendly</button>
          <button class="tone-chip" data-tone="urgent" onclick="selectTone(this)">Urgent</button>
          <button class="tone-chip" data-tone="fun" onclick="selectTone(this)">Fun &amp; casual</button>
          <button class="tone-chip" data-tone="inspirational" onclick="selectTone(this)">Inspirational</button>
        </div>
      </div>
    </div>

    <button class="generate-btn" id="genBtn" onclick="generateContent()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3l14 9-14 9V3z"/></svg>
      Generate AI Posts
    </button>

    <div class="error-card" id="errorCard"></div>
    <div class="loading" id="loading">
      <div class="spinner"></div>
      Writing your posts...
    </div>
    <div class="results" id="results"></div>

  </div>
</div>

<script>
let selectedType = 'promotion';
let selectedTone = 'professional';
let selectedPlatforms = new Set(['instagram', 'facebook']);

const ANTHROPIC_KEY = 'YOUR_ANTHROPIC_API_KEY';

function selectType(btn) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedType = btn.dataset.type;
}

function togglePlatform(btn) {
  btn.classList.toggle('active');
  if (btn.classList.contains('active')) selectedPlatforms.add(btn.dataset.platform);
  else selectedPlatforms.delete(btn.dataset.platform);
}

function selectTone(btn) {
  document.querySelectorAll('.tone-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedTone = btn.dataset.tone;
}

const platformInfo = {
  instagram: { label: 'Instagram', limit: 2200, tip: 'Best times: Tue–Fri 9–11am. Use 5–10 targeted hashtags. Hook in first 125 chars.' },
  facebook:  { label: 'Facebook',  limit: 63206, tip: 'Posts with questions get 100% more comments. Keep under 80 words. Use 1–2 hashtags.' },
  tiktok:    { label: 'TikTok',    limit: 2200,  tip: 'Hook in first 3 seconds. Use trending audio. Caption drives search — include keywords.' },
  linkedin:  { label: 'LinkedIn',  limit: 3000,  tip: 'B2B peak: Mon–Wed 8–10am. Line breaks every 1–2 sentences. End with a question.' },
  twitter:   { label: 'X / Twitter', limit: 280, tip: 'Under 100 chars = 17% more retweets. Peak hours: 8am and 6pm.' }
};

const typeLabels = {
  promotion: 'promotional sale/offer post',
  announcement: 'new announcement post',
  tip: 'educational tip/value post',
  review: 'customer review/testimonial post',
  behindscenes: 'behind the scenes post',
  question: 'engagement/question post to drive comments',
  holiday: 'holiday/seasonal post',
  beforeafter: 'before and after results post'
};

async function generateContent() {
  const desc = document.getElementById('postDesc').value.trim();
  if (!desc) { document.getElementById('postDesc').focus(); return; }
  if (selectedPlatforms.size === 0) return;

  const bizName = document.getElementById('bizName').value.trim();
  const btn = document.getElementById('genBtn');
  const loading = document.getElementById('loading');
  const results = document.getElementById('results');
  const errorCard = document.getElementById('errorCard');

  btn.disabled = true;
  loading.classList.add('visible');
  results.classList.remove('visible');
  results.innerHTML = '';
  errorCard.classList.remove('visible');

  const platformList = Array.from(selectedPlatforms).join(', ');

  const prompt = `You are an expert social media copywriter for small businesses. Generate optimized posts.

Post type: ${typeLabels[selectedType] || selectedType}
Tone: ${selectedTone}
${bizName ? `Business name: ${bizName}` : ''}
Details: ${desc}
Platforms: ${platformList}

For EACH platform, output EXACTLY this format:

PLATFORM: [platform name]
COPY:
[post copy optimized for that platform]
HASHTAGS: [relevant hashtags]
---

Platform rules:
- Instagram: 150-300 words, emojis welcome, strong hook in first line, 5-10 hashtags
- Facebook: 50-150 words, storytelling style, end with CTA, 1-2 hashtags
- TikTok: very short, punchy, use hooks like "POV:" or "Tell me why", trending language
- LinkedIn: 150-250 words, professional, no emojis, insight-driven, end with question
- X/Twitter: MUST be under 270 characters total, punchy, 1-2 hashtags max
- Write actual content — never use [placeholder] text`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API error');
    }

    const data = await response.json();
    const text = data.content?.[0]?.text || '';
    renderResults(text);
  } catch(e) {
    errorCard.textContent = 'Error: ' + e.message + '. Make sure your Anthropic API key is set in the page.';
    errorCard.classList.add('visible');
  } finally {
    btn.disabled = false;
    loading.classList.remove('visible');
  }
}

function renderResults(text) {
  const resultsEl = document.getElementById('results');
  const blocks = text.split('---').filter(b => b.trim());
  let html = '';

  blocks.forEach(block => {
    const platformMatch = block.match(/PLATFORM:\s*(.+)/i);
    const copyMatch = block.match(/COPY:\n([\s\S]+?)(?=HASHTAGS:|$)/i);
    const hashtagMatch = block.match(/HASHTAGS:\s*(.+)/i);
    if (!platformMatch) return;

    const rawPlatform = platformMatch[1].trim().toLowerCase();
    const platformKey = Object.keys(platformInfo).find(k => rawPlatform.includes(k)) || 'instagram';
    const info = platformInfo[platformKey];
    const copy = copyMatch ? copyMatch[1].trim() : '';
    const hashtags = hashtagMatch ? hashtagMatch[1].trim() : '';
    const charCount = (copy + ' ' + hashtags).length;
    const over = charCount > info.limit;

    html += `
    <div class="result-card">
      <div class="result-header">
        <div class="result-platform">
          ${platformSvg(platformKey)}
          ${info.label}
        </div>
        <span class="char-pill ${over ? 'over' : ''}">${charCount.toLocaleString()} / ${info.limit.toLocaleString()}</span>
      </div>
      <div class="result-body">
        <div class="result-copy">${esc(copy)}</div>
        ${hashtags ? `<div class="result-hashtags">${esc(hashtags)}</div>` : ''}
        <div class="result-tip">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          ${info.tip}
        </div>
      </div>
      <div class="result-actions">
        <button class="action-btn" id="copy-${platformKey}" onclick="copyPost(this, '${esc2(copy)}\\n\\n${esc2(hashtags)}')">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
          Copy post
        </button>
        <button class="action-btn" onclick="copyHashtags(this, '${esc2(hashtags)}')">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"/></svg>
          Copy hashtags
        </button>
      </div>
    </div>`;
  });

  if (!html) {
    document.getElementById('errorCard').textContent = 'No results parsed. Try again.';
    document.getElementById('errorCard').classList.add('visible');
    return;
  }
  resultsEl.innerHTML = html;
  resultsEl.classList.add('visible');
}

function copyPost(btn, text) {
  navigator.clipboard.writeText(text.replace(/\\n/g, '\n')).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2000);
  });
}

function copyHashtags(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2000);
  });
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function esc2(str) {
  return str.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n');
}

    facebook: '<svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px;color:var(--gold)"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>',

    linkedin: '<svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px;color:var(--gold)"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>',
    twitter: '<svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px;color:var(--gold)"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
  };
  return svgs[key] || svgs.instagram;
}
</script>
</body>
</html>
